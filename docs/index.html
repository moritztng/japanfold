<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JapanFold API — Docs</title>
<meta name="description" content="JapanFold API documentation — free, public, Tenstorrent-accelerated protein structure prediction and binder design.">
<style>
  :root{
    --bg:#ffffff; --fg:#1a1a1a; --muted:#6b7280; --line:#e5e7eb;
    --accent:#b91c1c; --code-bg:#f6f7f9; --sidebar:#fafafa;
    --max: 820px;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0f1115; --fg:#e6e6e6; --muted:#9aa0aa; --line:#242833;
           --accent:#f87171; --code-bg:#161a22; --sidebar:#0c0e12; }
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--fg);
    font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; min-height:100vh;
  }
  a{color:var(--accent); text-decoration:none}
  a:hover{text-decoration:underline}
  /* sidebar */
  aside{
    width:250px; flex:0 0 250px; background:var(--sidebar);
    border-right:1px solid var(--line); padding:24px 18px;
    position:sticky; top:0; align-self:flex-start; height:100vh; overflow-y:auto;
  }
  aside .brand{font-weight:700; font-size:18px; letter-spacing:-.2px; margin-bottom:2px}
  aside .brand a{color:var(--fg)}
  aside .tag{color:var(--muted); font-size:12.5px; margin-bottom:20px}
  aside nav a{
    display:block; padding:6px 10px; margin:1px 0; border-radius:7px;
    color:var(--fg); font-size:14.5px;
  }
  aside nav a:hover{background:var(--code-bg); text-decoration:none}
  aside nav a.active{background:var(--accent); color:#fff}
  aside nav .sep{height:1px; background:var(--line); margin:14px 4px}
  aside .ext{color:var(--muted); font-size:13px; padding:6px 10px; display:block}
  /* content */
  main{flex:1; min-width:0; display:flex; justify-content:center; padding:40px 32px 80px}
  article{width:100%; max-width:var(--max)}
  article h1{font-size:30px; letter-spacing:-.5px; margin:.2em 0 .5em}
  article h2{font-size:22px; margin-top:1.8em; padding-bottom:.25em; border-bottom:1px solid var(--line)}
  article h3{font-size:17px; margin-top:1.6em}
  article code{background:var(--code-bg); padding:.15em .4em; border-radius:5px; font-size:.88em;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  article pre{background:var(--code-bg); border:1px solid var(--line); border-radius:10px;
    padding:16px; overflow-x:auto}
  article pre code{background:none; padding:0; font-size:13px; line-height:1.55}
  article table{border-collapse:collapse; width:100%; margin:1em 0; font-size:14px; display:block; overflow-x:auto}
  article th,article td{border:1px solid var(--line); padding:7px 11px; text-align:left; vertical-align:top}
  article th{background:var(--code-bg)}
  article blockquote{margin:1em 0; padding:.4em 1em; border-left:3px solid var(--accent);
    background:var(--code-bg); border-radius:0 8px 8px 0; color:var(--fg)}
  article blockquote p{margin:.4em 0}
  article hr{border:none; border-top:1px solid var(--line); margin:2em 0}
  .topbar{display:none}
  @media (max-width:820px){
    body{flex-direction:column}
    aside{width:100%; flex:none; height:auto; position:static; border-right:none; border-bottom:1px solid var(--line)}
    main{padding:24px 18px 60px}
  }
</style>
</head>
<body>
<aside>
  <div class="brand"><a href="#/overview">JapanFold API</a></div>
  <div class="tag">Structure prediction &amp; binder design</div>
  <nav id="nav">
    <a data-doc="overview.md">Overview &amp; quickstart</a>
    <a data-doc="authentication.md">Authentication</a>
    <a data-doc="predictions.md">Predictions</a>
    <a data-doc="designs.md">Designs</a>
    <a data-doc="jobs.md">Jobs</a>
    <a data-doc="models-and-limits.md">Models &amp; limits</a>
    <a data-doc="errors.md">Errors</a>
    <a data-doc="examples.md">Examples</a>
    <a data-doc="skill.md">The JapanFold skill</a>
    <div class="sep"></div>
    <a href="api.html">API reference (OpenAPI) ↗</a>
    <a href="https://api.japanfold.com/v1/openapi.json">openapi.json ↗</a>
    <a href="https://japanfold.com">japanfold.com ↗</a>
  </nav>
</aside>
<main><article id="content">Loading…</article></main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const NAV = document.getElementById('nav');
const CONTENT = document.getElementById('content');
const DOCS = [...NAV.querySelectorAll('a[data-doc]')].map(a => a.dataset.doc);
const DEFAULT = 'overview.md';

function currentDoc(){
  const h = location.hash.replace(/^#\/?/, '');
  return DOCS.includes(h) ? h : DEFAULT;
}

async function render(){
  const doc = currentDoc();
  NAV.querySelectorAll('a[data-doc]').forEach(a =>
    a.classList.toggle('active', a.dataset.doc === doc));
  try{
    const res = await fetch(doc, {cache:'no-cache'});
    if(!res.ok) throw new Error(res.status);
    const md = await res.text();
    CONTENT.innerHTML = marked.parse(md);
    // rewrite in-repo .md links to hash routes
    CONTENT.querySelectorAll('a[href$=".md"]').forEach(a=>{
      const file = a.getAttribute('href').split('/').pop().split('#')[0];
      if(DOCS.includes(file)) a.setAttribute('href', '#/'+file);
    });
    window.scrollTo(0,0);
  }catch(e){
    CONTENT.innerHTML = '<h1>Not found</h1><p>Could not load <code>'+doc+
      '</code>. Serve this folder over HTTP (see <code>docs/README.md</code>).</p>';
  }
}

window.addEventListener('hashchange', render);
render();
</script>
</body>
</html>
